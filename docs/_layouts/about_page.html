<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

{% seo %}
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
    <!--[if lt IE 9]>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5shiv/3.7.3/html5shiv.min.js"></script>
    <![endif]-->
    {% include head-custom.html %}
  </head>
  <body>
    <div class="wrapper">
      <header>
        <h1><a href="{{ "/" | absolute_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>

        <h1 class="post-title">{{ page.title | escape }}</h1>
        <p>{{ page.subtitle | escape }}</p>

        <p class="view"> <a href="https://github.com/sumeetshirgure">GitHub</a> home page</p>
        <p class="view"> <a href="https://codeforces.com/profile/Sumeet.Shirgure">Codeforces</a> user profile</p>
        <p class="view"> <a href="https://linkedin.com/in/sumeetshirgure">LinkedIn</a> page</p>

      </header>
      <section>
      <div>
        <header class="post-header">
        </header>
      </div>

      {{ content }}

      </section>
    </div>
    <script src="{{ "/assets/js/scale.fix.js" | relative_url }}"></script>
  </body>
</html>
